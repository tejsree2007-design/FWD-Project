<!DOCTYPE html>
<html>
<head>
<title>User Signup</title>

</head>

<body>

<header>
<h1>Sunrise Hotel Signup</h1>
</header>

<section class="section">

<h2>Create Account</h2>

</form>

<p id="message"></p>

</section>

<script src="signup.js"></script>

</body>
</html>
